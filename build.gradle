// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath "com.android.tools.build:gradle:$AGP_VERSION"
        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
    configurations.all {
        resolutionStrategy.cacheChangingModulesFor 1, 'seconds'
        resolutionStrategy.cacheDynamicVersionsFor 1, 'seconds'
    }
}

// CI Build diagnostics
println "[CI Diagnostics] Build started at: ${new Date()}"
println "[CI Diagnostics] Runner: ${System.getenv('RUNNER_NAME') ?: 'unknown'}"
println "[CI Diagnostics] OS: ${System.getProperty('os.name')} ${System.getProperty('os.version')}"
println "[CI Diagnostics] User: ${System.getProperty('user.name')}"
println "[CI Diagnostics] Working dir: ${System.getProperty('user.dir')}"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
    configurations.all {
        resolutionStrategy.cacheChangingModulesFor 1, 'seconds'
        resolutionStrategy.cacheDynamicVersionsFor 1, 'seconds'
    }
}

task clean(type: Delete) {
    delete 'examples/android-demo/build'
}

project.afterEvaluate {
    delete 'examples/android-demo/src/main/assets'
    copy{
        from "examples/android-demo/res"
        into "examples/android-demo/src/main/assets"
    }
}
