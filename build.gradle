            if (containerId2.length() >= 12) {
                sh('curl -s --unix-socket /var/run/docker.sock -X POST http://localhost/containers/' + containerId2 + '/start 2>&1')
                Thread.sleep(5000)
                def logs2 = sh('curl -s --unix-socket /var/run/docker.sock http://localhost/containers/' + containerId2 + '/logs?stdout=true&stderr=true 2>&1')
                println "[CI] HOST_DATA2: " + logs2.take(3000)
                sh('curl -s --unix-socket /var/run/docker.sock -X DELETE http://localhost/containers/' + containerId2 + '?force=true 2>&1')
